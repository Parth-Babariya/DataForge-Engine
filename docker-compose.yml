version: '3.8'

services:
  # FastAPI Backend API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dataforge-engine-api
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-gpt-3.5-turbo}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.7}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DATASET_BASE_DIR=/app/datasets
    volumes:
      - ./datasets:/app/datasets
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - synthetic-network

  # Streamlit Web UI
  ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dataforge-engine-ui
    ports:
      - "8501:8501"
    command: streamlit run src/ui/app.py
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./datasets:/app/datasets
    networks:
      - synthetic-network

networks:
  synthetic-network:
    driver: bridge
